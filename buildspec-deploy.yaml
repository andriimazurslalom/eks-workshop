version: 0.2

env:
    variables:
        AWS_REGION: eu-central-1
        CLUSTER_NAME: eks-lab-cluster
        RELEASE_NAME: sample-app
        NAMESPACE: sample-app
        KUBECONFIG: /tmp/kubeconfig


phases:
    install:
        commands:
            - echo "Installing Helm"
            - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    pre_build:
        commands:
            - echo "Checking tool versions"
            - aws --version
            - kubectl version --client
            - helm version
            - echo "Updating kubeconfig for cluster ${CLUSTER_NAME}"
            - aws eks update-kubeconfig --region ${AWS_REGION} --name ${CLUSTER_NAME}
            - echo "Verifying cluster connectivity"
            - kubectl get ns

    build:
        commands:
            - echo "Deploying Helm release"
            - helm upgrade --install ${RELEASE_NAME} charts/sample-app -f charts/sample-app/values-dev.yaml -n ${NAMESPACE} --create-namespace --set-string image.repository=${IMAGE_REPOSITORY} --set-string image.tag=${IMAGE_TAG} --set ingress.inboundCidrs[0]=${INGRESS_CIDR} --kubeconfig ${KUBECONFIG} --wait

    post_build:
        commands:
            - echo "Deployment complete"
            - kubectl get pods -n ${NAMESPACE}
            - kubectl get svc -n ${NAMESPACE}
