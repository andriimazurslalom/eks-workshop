apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  FEATURE_GREETING: {{ .Values.config.featureGreeting | quote }}
  EXTERNAL_API_BASE_URL: {{ .Values.config.externalApiBaseUrl | quote }}
